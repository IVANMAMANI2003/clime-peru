global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/alert.rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          component: prometheus
          environment: local

  - job_name: kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          component: kafka
          environment: local

  - job_name: kafka-ui
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - kafka-ui:8080
        labels:
          component: kafka-ui
          environment: local

  - job_name: jupyter
    metrics_path: /metrics
    static_configs:
      - targets:
          - jupyter:8888
        labels:
          component: jupyter
          environment: local

name: clime-peru

services:

  kafka:
    image: apache/kafka:4.2.0
    container_name: clime-kafka
    restart: unless-stopped
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      clime-net:
        aliases:
          - kafka

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: clime-kafka-exporter
    restart: unless-stopped
    command:
      - --kafka.server=kafka:9092
    depends_on:
      - kafka
    ports:
      - "19308:9308"
    networks:
      clime-net:
        aliases:
          - kafka-exporter

  prometheus:
    image: prom/prometheus:latest
    container_name: clime-prometheus
    restart: unless-stopped
    depends_on:
      - kafka-exporter
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    networks:
      clime-net:
        aliases:
          - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: clime-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      clime-net:
        aliases:
          - grafana

  postgres:
    image: postgres:15
    container_name: clime-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: climedb
      POSTGRES_USER: clime
      POSTGRES_PASSWORD: clime123
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      clime-net:
        aliases:
          - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: clime-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "18085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: clime-peru
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      clime-net:
        aliases:
          - kafka-ui

  jupyter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jupyter
    container_name: clime-jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ../data:/app/data
      - ../artifacts:/app/artifacts
      - ./notebooks:/opt/notebooks
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - clime-net

  # ── Bridges (1 por tabla Supabase) ────────────────────────────
  bridge-grupo2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-bridge-grupo2
    restart: unless-stopped
    depends_on:
      - kafka
    volumes:
      - ../artifacts:/app/artifacts
    command: [
      "python", "-m", "streaming.supabase_kafka_bridge",
      "--table", "grupo_2_air_quality",
      "--topic", "clima-grupo_2",
      "--time-format", "string",
    ]
    networks:
      - clime-net

  bridge-grupo3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-bridge-grupo3
    restart: unless-stopped
    depends_on:
      - kafka
    volumes:
      - ../artifacts:/app/artifacts
    command: [
      "python", "-m", "streaming.supabase_kafka_bridge",
      "--table", "grupo_3_air_quality",
      "--topic", "clima-grupo_3",
      "--time-format", "string",
    ]
    networks:
      - clime-net

  bridge-grupo4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-bridge-grupo4
    restart: unless-stopped
    depends_on:
      - kafka
    volumes:
      - ../artifacts:/app/artifacts
    command: [
      "python", "-m", "streaming.supabase_kafka_bridge",
      "--table", "grupo4_air_quality",
      "--topic", "clima-grupo_4",
      "--time-format", "string",
    ]
    networks:
      - clime-net

  # ── Spark (1 por estación/topic) ───────────────────────────────
  spark-grupo2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-spark-grupo2
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    volumes:
      - ../artifacts:/app/artifacts
    environment:
      - SPARK_DRIVER_MEMORY=2g
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/climedb
      - POSTGRES_USER=clime
      - POSTGRES_PASSWORD=clime123
    command: [
      "python", "-m", "streaming.spark_streaming_processor",
      "--input-topic", "clima-grupo_2",
      "--anomaly-topic", "clima-grupo_2-anomalias",
    ]
    networks:
      - clime-net

  spark-grupo3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-spark-grupo3
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    volumes:
      - ../artifacts:/app/artifacts
    environment:
      - SPARK_DRIVER_MEMORY=2g
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/climedb
      - POSTGRES_USER=clime
      - POSTGRES_PASSWORD=clime123
    command: [
      "python", "-m", "streaming.spark_streaming_processor",
      "--input-topic", "clima-grupo_3",
      "--anomaly-topic", "clima-grupo_3-anomalias",
    ]
    networks:
      - clime-net

  spark-grupo4:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streaming
    container_name: clime-spark-grupo4
    restart: unless-stopped
    depends_on:
      - kafka
      - postgres
    volumes:
      - ../artifacts:/app/artifacts
    environment:
      - SPARK_DRIVER_MEMORY=2g
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/climedb
      - POSTGRES_USER=clime
      - POSTGRES_PASSWORD=clime123
    command: [
      "python", "-m", "streaming.spark_streaming_processor",
      "--input-topic", "clima-grupo_4",
      "--anomaly-topic", "clima-grupo_4-anomalias",
    ]
    networks:
      - clime-net

  # ── Monitoring ──────────────────────────────────────────────
  kafka-value-exporter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.monitoring
    container_name: clime-kafka-value-exporter
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EXPORTER_PORT: "8000"
      POLL_INTERVAL: "15"
    networks:
      - clime-net

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: clime-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ../artifacts:/app/artifacts
      - ../data:/app/data
      - ../ml:/app/ml
      - ../dashboard:/app/dashboard
    environment:
      ARTIFACTS_PATH: /app/artifacts
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - clime-net

networks:
  clime-net:
    driver: bridge

volumes:
  grafana_data:
  pg_data:
